<script>
const slug='__INVITATION_SLUG__',root=document.querySelector('#publicRoot');
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const khmerFor=(date,time='00:00')=>{try{if(!window.momentkh||!date)return'';let[y,m,d]=date.split('-').map(Number),[h,min]=time.split(':').map(Number);return momentkh.format(momentkh.fromGregorian(y,m,d,h||0,min||0))}catch{return''}};
const animationName=preset=>{const map={'fade-up':'fadeUp','soft-zoom':'softZoom','slide-left':'slideLeft','blur-in':'blurIn','bounce-in':'bounceIn','flip-in':'flipIn',float:'float',none:''};return Object.prototype.hasOwnProperty.call(map,preset)?map[preset]:'fadeUp'};
const langText=(en,km,mode)=>mode==='km'?`<span class="i18n i18n-km khmer-text">${esc(km||en)}</span>`:mode==='both'?`<span class="i18n i18n-en">${esc(en)}</span><span class="i18n i18n-km khmer-text">${esc(km||en)}</span>`:`<span class="i18n i18n-en">${esc(en)}</span>`;
const languageSwitcher=mode=>mode==='both'?'<div class="language-switch" role="group" aria-label="Invitation language"><button type="button" data-guest-lang="en" class="active">EN</button><button type="button" data-guest-lang="km">ខ្មែរ</button></div>':'';
const templateDecor=theme=>({rose:'<span class="template-symbol">❦</span>',gold:'<span class="template-symbol khmer-ornament">◆ ◇ ◆</span>',emerald:'<span class="template-symbol">❧</span>',midnight:'<span class="template-symbol">✦ ✧ ✦</span>'}[theme]||'<span class="template-symbol">❦</span>');
const blockLabel=type=>({story:'Our Story','dress-code':'Dress Code',note:'Important Note',quote:'Quote',accommodation:'Accommodation',gift:'Gift Note',custom:'Custom Section'}[type]||'Custom Section');
function rsvpCustomFields(d,mode){return(d.rsvpFields||[]).map(field=>{const name=`custom_${String(field.id||'').replace(/[^A-Za-z0-9_-]/g,'')}`,label=langText(field.label||'Question',field.labelKm||field.label||'Question',mode),required=field.required?' required':'',type=field.type||'text';if(type==='textarea')return`<label>${label}<textarea name="${esc(name)}" maxlength="2000"${required}></textarea></label>`;if(type==='select')return`<label>${label}<select name="${esc(name)}"${required}><option value="">${langText('Select an option','សូមជ្រើសរើស',mode)}</option>${(field.options||[]).map(option=>`<option value="${esc(option)}">${esc(option)}</option>`).join('')}</select></label>`;if(type==='number')return`<label>${label}<input name="${esc(name)}" type="number"${required}></label>`;return`<label>${label}<input name="${esc(name)}" maxlength="2000"${required}></label>`}).join('')}
function icsEscape(value){return String(value||'').replace(/\\/g,'\\\\').replace(/\n/g,'\\n').replace(/,/g,'\\,').replace(/;/g,'\\;')}
function icsLocal(date){const pad=n=>String(n).padStart(2,'0');return`${date.getFullYear()}${pad(date.getMonth()+1)}${pad(date.getDate())}T${pad(date.getHours())}${pad(date.getMinutes())}00`}
function downloadCalendar(d){const f=d.fields||{},start=new Date(`${f.date||''}T${f.time||'00:00'}:00`);if(Number.isNaN(start.getTime())){guestToast('This invitation does not have a valid event date yet.');return}const end=new Date(start.getTime()+2*60*60*1000),lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//E-invitation-website//EN','CALSCALE:GREGORIAN','METHOD:PUBLISH','BEGIN:VEVENT',`UID:${crypto.randomUUID()}@e-invitation-website`,`DTSTAMP:${new Date().toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,'')}`,`DTSTART:${icsLocal(start)}`,`DTEND:${icsLocal(end)}`,`SUMMARY:${icsEscape(f.names||'Invitation')}`,`DESCRIPTION:${icsEscape(f.message||'')}`,`LOCATION:${icsEscape(f.venue||'')}`,`URL:${icsEscape(location.href)}`,'END:VEVENT','END:VCALENDAR'];const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([lines.join('\r\n')],{type:'text/calendar;charset=utf-8'}));a.download=`${String(f.names||'event').replace(/[^A-Za-z0-9_-]+/g,'-').replace(/^-|-$/g,'').toLowerCase()||'event'}.ics`;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function guestToast(message){let host=document.querySelector('.guest-toast-stack');if(!host){host=document.createElement('div');host.className='guest-toast-stack';document.body.append(host)}const toast=document.createElement('div');toast.className='guest-toast';toast.textContent=message;host.append(toast);requestAnimationFrame(()=>toast.classList.add('show'));setTimeout(()=>{toast.classList.remove('show');setTimeout(()=>toast.remove(),220)},2100)}
async function shareInvitation(){const data={title:document.title,text:'You are invited',url:location.href};if(navigator.share)try{await navigator.share(data);return}catch(err){if(err.name==='AbortError')return}try{await navigator.clipboard.writeText(location.href);guestToast('Invitation link copied.')}catch{const input=document.createElement('input');input.value=location.href;input.setAttribute('readonly','');input.style.position='fixed';input.style.opacity='0';document.body.append(input);input.select();try{document.execCommand('copy');guestToast('Invitation link copied.')}catch{guestToast('Copy the invitation link from your browser address bar.')}input.remove()}}


function sectionAnimationStyle(d,name){let defaults={hero:{preset:'fade-up',duration:900},gallery:{preset:'fade-up',duration:900},video:{preset:'soft-zoom',duration:900},countdown:{preset:'soft-zoom',duration:900},schedule:{preset:'fade-up',duration:900},custom:{preset:'fade-up',duration:900},venue:{preset:'fade-up',duration:900},contact:{preset:'fade-up',duration:900},rsvp:{preset:'fade-up',duration:900},wishes:{preset:'fade-up',duration:900}},setting=d.sectionAnimations?.[name]||defaults[name]||defaults.hero,animation=animationName(setting.preset);return animation?`animation-name:${animation};animation-duration:${Math.max(300,Math.min(3000,Number(setting.duration||900)))}ms`:'animation:none'}
function safeSectionImageUrl(value){let raw=String(value||'').trim();return /^https?:\/\//i.test(raw)||raw.startsWith('/data/uploads/')||/^data:image\/(?:jpeg|png|webp|gif);base64,/i.test(raw)?raw:''}
function featuredVideoMarkup(d,mode){if(d.settings?.videoEnabled!==true||!d.video?.url)return'';let url=String(d.video.url||'');if(!(url.startsWith('/uploads/')||url.startsWith('/data/uploads/')||/^https?:\/\//i.test(url)||/^data:video\/(?:mp4|webm);base64,/i.test(url)))return'';return`<section class="video-section reveal" style="${combinedSectionStyle(d,'video')}"><h2>${langText('Featured Video','វីដេអូពិសេស',mode)}</h2><video class="invitation-video" controls playsinline preload="metadata" src="${esc(url)}"></video></section>`}
function sectionVisualStyle(d,name){let v=d.sectionStyles?.[name];if(!v)return'';let r=[];if(v.backgroundEnabled&&/^#[0-9a-f]{6}$/i.test(v.background||''))r.push(`background-color:${v.background}`);let imageUrl=safeSectionImageUrl(v.backgroundImage);if(v.backgroundImageEnabled&&imageUrl){let overlay=Math.max(0,Math.min(80,Number(v.backgroundOverlay||0)))/100;r.push(`background-image:linear-gradient(rgba(0,0,0,${overlay}),rgba(0,0,0,${overlay})),url(&quot;${esc(imageUrl)}&quot;)`,`background-size:${v.backgroundSize==='contain'?'contain':'cover'}`,'background-position:center','background-repeat:no-repeat')}if(v.textColorEnabled&&/^#[0-9a-f]{6}$/i.test(v.textColor||''))r.push(`color:${v.textColor}`,`--section-text:${v.textColor}`);let radius=Math.max(0,Math.min(60,Number(v.radius||0)));if(radius)r.push(`border-radius:${radius}px`);return r.join(';')}
function combinedSectionStyle(d,name){return[sectionAnimationStyle(d,name),sectionVisualStyle(d,name)].filter(Boolean).join(';')}
function objectDimension(value,axis='x'){return window.EInviteRenderer?.objectDimension?EInviteRenderer.objectDimension(value,axis):value}
function imageFilterStyle(o){return window.EInviteRenderer?.imageFilterStyle?EInviteRenderer.imageFilterStyle(o):''}
function advancedObjectStyle(o){let blend=['normal','multiply','screen','overlay','soft-light','darken','lighten'].includes(o.blendMode)?o.blendMode:'normal',delay=Math.max(0,Math.min(5000,Number(o.animationDelay||0))),background='transparent';if(o.backgroundEnabled){let hex=/^#[0-9a-f]{6}$/i.test(o.backgroundColor||'')?o.backgroundColor:'#ffffff',alpha=Math.max(0,Math.min(100,Number(o.backgroundOpacity??100)))/100,h=hex.slice(1);background=`rgba(${parseInt(h.slice(0,2),16)},${parseInt(h.slice(2,4),16)},${parseInt(h.slice(4,6),16)},${alpha})`}return`mix-blend-mode:${blend};background:${background};animation-delay:${delay}ms`}
function advancedTextStyle(o){let transform=['none','uppercase','lowercase','capitalize'].includes(o.textTransform)?o.textTransform:'none',stroke=Math.max(0,Math.min(8,Number(o.textStrokeWidth||0))),strokeColor=/^#[0-9a-f]{6}$/i.test(o.textStrokeColor||'')?o.textStrokeColor:'#ffffff',shadowBlur=Math.max(0,Math.min(40,Number(o.textShadowBlur||0))),shadowColor=/^#[0-9a-f]{6}$/i.test(o.textShadowColor||'')?o.textShadowColor:'#000000',shadow=shadowBlur?`text-shadow:0 ${Math.max(1,Math.round(shadowBlur/4))}px ${shadowBlur}px ${shadowColor};`:'',gradient=o.textGradientEnabled?`background-image:linear-gradient(${Math.max(0,Math.min(360,Number(o.textGradientAngle||90)))}deg,${esc(o.textGradientStart||'#9d4555')},${esc(o.textGradientEnd||'#b58a3a')});background-clip:text;-webkit-background-clip:text;color:transparent;`:'';return`text-transform:${transform};-webkit-text-stroke:${stroke}px ${strokeColor};${shadow}${gradient}`}
function shapeFillStyle(o){return o.fillMode==='gradient'?`linear-gradient(${Math.max(0,Math.min(360,Number(o.gradientAngle||135)))}deg,${esc(o.gradientStart||'#d9a6ad')},${esc(o.gradientEnd||'#9d4555')})`:esc(o.fillColor||'#d9a6ad')}
function artisticHeroMarkup(d,mode){
 const f=d.fields||{},objects=Object.entries(d.objects||{}).filter(([,o])=>o.showInHero!==false&&o.visible!==false).sort(([,a],[,b])=>Number(a.zIndex||0)-Number(b.zIndex||0));if(!objects.length)return'';
 const gregorian=(()=>{let dt=new Date((f.date||'')+'T00:00:00');return isNaN(dt)?(f.date||''):dt.toLocaleDateString(undefined,{dateStyle:'long'})})();
 const contentFor=(id,o)=>{if(id==='title')return langText(f.names||'',f.namesKm||f.names||'',mode);if(id==='subtitle')return langText(f.message||'',f.messageKm||f.message||'',mode);if(id==='details')return`${esc(gregorian)}${f.time?` · ${esc(f.time)}`:''}<br>${langText(f.venue||'',f.venueKm||f.venue||'',mode)}`;return window.EInviteRenderer?EInviteRenderer.sanitizeRichText(o.html||''):esc(String(o.html||'').replace(/<[^>]+>/g,' ').trim())};
 const rendered=window.EInviteRenderer?.renderObject?objects.map(([id,o])=>EInviteRenderer.renderObject(o,{id,pageHeight:844,content:contentFor(id,o),heroTitle:id==='title'})).join(''):'';
 return`<section class="artistic-hero-section reveal" style="${sectionAnimationStyle(d,'hero')}"><div class="published-artboard">${rendered}</div></section>`
}
function designPageObjectMarkup(objects,pageHeight=844){let entries=Object.entries(objects||{}).filter(([,o])=>o.visible!==false).sort(([,a],[,b])=>Number(a.zIndex||0)-Number(b.zIndex||0));return window.EInviteRenderer?.renderObject?entries.map(([id,o])=>EInviteRenderer.renderObject(o,{id,pageHeight,content:EInviteRenderer.sanitizeRichText(o.html||'')})).join(''):''}
function designPageMarkup(d,token){if(!String(token||'').startsWith('page:'))return'';let id=String(token).slice(5),page=(d.designPages||[]).find(item=>item.id===id);if(!page||page.enabled===false)return'';let master=d.masterPageStyle||{},source=page.useMasterBackground&&master.enabled?master:page,image=safeSectionImageUrl(source.backgroundImage),overlay=Math.max(0,Math.min(80,Number(source.backgroundOverlay||0)))/100,bg=/^#[0-9a-f]{6}$/i.test(source.background||'')?source.background:'#fffaf6',imageRules=image?`background-image:linear-gradient(rgba(0,0,0,${overlay}),rgba(0,0,0,${overlay})),url(&quot;${esc(image)}&quot;);background-size:${source.backgroundSize==='contain'?'contain':'cover'};background-position:center;background-repeat:no-repeat;`:'',animation=animationName(page.animation?.preset||'fade-up'),duration=Math.max(300,Math.min(3000,Number(page.animation?.duration||900))),motion=animation?`animation-name:${animation};animation-duration:${duration}ms`:'animation:none',transition=['none','soft','overlap','sweep'].includes(page.transition?.preset)?page.transition.preset:'soft',transitionDuration=Math.max(200,Math.min(2000,Number(page.transition?.duration||600)));return`<section class="design-page-section reveal page-transition-${transition}" style="--page-transition-duration:${transitionDuration}ms;background:${bg};${imageRules}${motion}"><div class="published-artboard published-page-artboard">${designPageObjectMarkup(page.objects||{})}</div></section>`}
function customBlocksMarkup(d,mode){let blocks=(d.customBlocks||[]).filter(b=>b.enabled!==false);if(!blocks.length)return'';let layout=esc(d.sectionLayouts?.custom||'cards');return`<div class="custom-blocks custom-layout-${layout} reveal" style="${combinedSectionStyle(d,'custom')}">${blocks.map(b=>`<section class="custom-info-block block-${esc(b.type||'custom')}"><div class="block-icon">${b.type==='story'?'♥':b.type==='dress-code'?'✦':b.type==='note'?'!':b.type==='quote'?'“':b.type==='accommodation'?'⌂':b.type==='gift'?'◇':'◇'}</div><h2>${langText(b.heading||blockLabel(b.type),b.headingKm||b.heading||blockLabel(b.type),mode)}</h2><p>${langText(b.body||'',b.bodyKm||b.body||'',mode)}</p></section>`).join('')}</div>`}
function orderedPhotos(d){let objects=d.objects||{},photos=Object.entries(objects).filter(([,o])=>o.type==='image'&&o.src&&o.showInGallery!==false),order=Array.isArray(d.galleryOrder)?d.galleryOrder:[];return photos.sort(([aId,a],[bId,b])=>{let ai=order.indexOf(aId),bi=order.indexOf(bId);if(ai>=0||bi>=0)return(ai<0?9999:ai)-(bi<0?9999:bi);return Number(a.zIndex||0)-Number(b.zIndex||0)}).map(([id,photo])=>({id,...photo}))}
function galleryMarkup(d){if(d.settings?.galleryEnabled===false)return'';let photos=orderedPhotos(d);if(!photos.length)return'';return`<section class="photo-gallery gallery-${esc(d.galleryStyle||'grid')} reveal" style="${combinedSectionStyle(d,'gallery')}" aria-label="Photo gallery">${photos.map((photo,index)=>{let animation=animationName(photo.animation),duration=Math.max(300,Math.min(3000,+(photo.duration||900))),delay=Math.min(index*.12,.72);return`<figure class="gallery-photo"><img src="${esc(photo.src)}" alt="${esc(photo.alt||`Celebration photo ${index+1}`)}" loading="${index?'lazy':'eager'}" class="reveal" style="animation-name:${animation};animation-duration:${duration}ms;animation-delay:${delay}s;object-fit:${esc(photo.imageFit||'cover')};object-position:${Number(photo.imagePositionX??50)}% ${Number(photo.imagePositionY??50)}%;filter:${imageFilterStyle(photo)}">${photo.caption?`<figcaption>${esc(photo.caption)}</figcaption>`:''}</figure>`}).join('')}</section>`}
function normalizedTelegram(value){let raw=String(value||'').trim();if(!raw)return'';if(/^https:\/\/t\.me\/[A-Za-z0-9_]{5,}$/i.test(raw))return raw;let username=raw.replace(/^@/,'');return/^[A-Za-z0-9_]{5,}$/.test(username)?`https://t.me/${username}`:''}
function contactMarkup(d,mode){if(d.settings?.contactEnabled===false)return'';let phone=String(d.contactPhone||'').trim(),telegram=normalizedTelegram(d.contactTelegram),phoneHref=/^[+0-9() .-]{5,30}$/.test(phone)?`tel:${phone.replace(/[^+0-9]/g,'')}`:'';if(!phoneHref&&!telegram)return'';return`<section class="contact-section reveal" style="${combinedSectionStyle(d,'contact')}"><h2>${langText('Contact the hosts','ទំនាក់ទំនងម្ចាស់កម្មវិធី',mode)}</h2><div class="contact-actions">${phoneHref?`<a href="${esc(phoneHref)}">☎ ${langText('Call','ទូរស័ព្ទ',mode)}</a>`:''}${telegram?`<a href="${esc(telegram)}" target="_blank" rel="noopener">✈ Telegram</a>`:''}</div></section>`}
function bindLanguageSwitch(mode){if(mode!=='both')return;let guest=root.querySelector('.guest')||root,setLanguage=lang=>{guest.dataset.language=lang;root.querySelectorAll('[data-guest-lang]').forEach(button=>button.classList.toggle('active',button.dataset.guestLang===lang));root.querySelectorAll('option[data-en]').forEach(option=>option.textContent=option.dataset[lang]||option.dataset.en)};root.querySelectorAll('[data-guest-lang]').forEach(button=>button.onclick=()=>setLanguage(button.dataset.guestLang));setLanguage('en')}
function startCountdown(){let box=document.querySelector('.countdown');if(!box)return;let target=new Date(box.dataset.target).getTime(),tick=()=>{let left=Math.max(0,target-Date.now()),values={days:Math.floor(left/864e5),hours:Math.floor(left/36e5)%24,minutes:Math.floor(left/6e4)%60,seconds:Math.floor(left/1e3)%60};Object.entries(values).forEach(([unit,value])=>{let el=box.querySelector(`[data-unit="${unit}"]`);if(el)el.textContent=String(value).padStart(2,'0')})};tick();setInterval(tick,1000)}
const palettePresets={rose:{background:'#fff6f3',surface:'#fffdfc',text:'#3d292f',heading:'#9d4555'},gold:{background:'#fff9eb',surface:'#fffdf7',text:'#4b3716',heading:'#a87616'},emerald:{background:'#eef8f1',surface:'#ffffff',text:'#29443a',heading:'#1f7158'},midnight:{background:'#100e19',surface:'#211b2d',text:'#f4efff',heading:'#c8b5ff'},'ivory-navy':{background:'#f7f2e8',surface:'#fffdf8',text:'#263248',heading:'#1f365d'}};
function paletteRootStyle(d){if(!d.palettePreset||d.palettePreset==='template')return'';let p=d.palette||palettePresets[d.palettePreset]||palettePresets.rose,valid=v=>/^#[0-9a-f]{6}$/i.test(v||'')?v:'#fff';return`--palette-background:${valid(p.background)};--palette-surface:${valid(p.surface)};--palette-text:${valid(p.text)};--palette-heading:${valid(p.heading)};--palette-accent:${valid(d.accent||p.heading)}`}
const guestToken=new URLSearchParams(location.search).get('g');let publicAccessToken=sessionStorage.getItem('sovan-invite-access:'+slug)||'';
function passwordGate(){return new Promise((resolve,reject)=>{root.className='guest';root.innerHTML=`<section class="invitation-password-gate"><div><span class="template-symbol">✦</span><h1>Private Invitation</h1><p>This invitation is password protected.</p><form id="accessForm"><label>Invitation password<input id="accessPassword" type="password" required autocomplete="current-password"></label><button class="primary">Open invitation</button><p id="accessError" class="hint"></p></form></div></section>`;const form=document.querySelector('#accessForm');form.onsubmit=async e=>{e.preventDefault();const button=form.querySelector('button'),error=document.querySelector('#accessError');button.disabled=true;error.textContent='';try{const response=await fetch('/api/public/'+encodeURIComponent(slug)+'/unlock',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:document.querySelector('#accessPassword').value})});const data=await response.json().catch(()=>({}));if(!response.ok)throw Error(data.error||'Unable to open invitation');sessionStorage.setItem('sovan-invite-access:'+slug,data.accessToken||'');resolve(data.accessToken||'')}catch(err){error.textContent=err.message;button.disabled=false}}})}
async function loadPublic(){let accessToken=publicAccessToken;for(let attempt=0;attempt<2;attempt++){const params=new URLSearchParams();if(guestToken)params.set('guest',guestToken);if(accessToken)params.set('access',accessToken);const response=await fetch('/api/public/'+encodeURIComponent(slug)+(params.toString()?'?'+params.toString():''));if(response.ok)return response.json();const data=await response.json().catch(()=>({}));if(response.status===403&&data.protected){accessToken=await passwordGate();publicAccessToken=accessToken;continue}throw Error(data.error||'Invitation unavailable')}throw Error('Invitation access could not be verified')}
loadPublic().then(p=>{

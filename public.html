<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Invitation</title><link rel="stylesheet" href="styles.css"></head><body><main id="publicRoot" class="guest"><p>Opening invitation…</p></main><script>
const slug='__INVITATION_SLUG__',root=document.querySelector('#publicRoot');
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
fetch('/api/public/'+encodeURIComponent(slug)).then(r=>r.ok?r.json():Promise.reject()).then(p=>{const f=p.document.fields||{},objects=Object.values(p.document.objects||{}),hero=objects.find(x=>x.type==='image')?.src||'';root.innerHTML=`<p>YOU ARE INVITED</p><h1 class="reveal">${esc(f.names)}</h1>${hero?`<img class="reveal" src="${esc(hero)}">`:''}<h2>${esc(new Date(f.date+'T00:00:00').toLocaleDateString(undefined,{dateStyle:'long'}))}</h2><p>${esc(f.message)}</p><p><strong>${esc(f.venue)}</strong></p><form id="rsvp"><h2>RSVP</h2><label>Your name<input name="name" required maxlength="120"></label><label>Will you attend?<select name="status"><option>Yes, joyfully</option><option>Unable to attend</option><option>Maybe</option></select></label><label>Number of guests<input name="count" type="number" min="1" max="10" value="1"></label><label>Message<textarea name="note" maxlength="1000"></textarea></label><button class="primary">Send RSVP</button></form>`;document.querySelector('#rsvp').onsubmit=async e=>{e.preventDefault();let data=Object.fromEntries(new FormData(e.target)),r=await fetch('/api/public/'+encodeURIComponent(slug)+'/rsvps',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});e.target.innerHTML=r.ok?'<h2>Thank you!</h2><p>Your response was received.</p>':'<p>We could not save your response. Please try again.</p>'}}).catch(()=>root.innerHTML='<h1>Invitation unavailable</h1><p>This invitation has not been published.</p>');
</script></body></html>

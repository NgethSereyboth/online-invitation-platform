<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Invitation</title><link rel="stylesheet" href="styles.css"></head><body><main id="publicRoot" class="guest"><p>Opening invitation…</p></main><script>
const slug='__INVITATION_SLUG__',root=document.querySelector('#publicRoot');
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const guestToken=new URLSearchParams(location.search).get('g');
fetch('/api/public/'+encodeURIComponent(slug)+(guestToken?'?guest='+encodeURIComponent(guestToken):'')).then(r=>r.ok?r.json():Promise.reject()).then(p=>{
  const d=p.document,f=d.fields||{},objects=Object.values(d.objects||{}),hero=objects.find(x=>x.type==='image')?.src||'',guest=p.guest?.name||'',rsvpEnabled=d.settings?.rsvpEnabled!==false,anim=objects[0]?.animation||'fade-up',duration=Math.max(300,Math.min(3000,+(objects[0]?.duration||900))),key={'fade-up':'fadeUp','soft-zoom':'softZoom','slide-left':'slideLeft','blur-in':'blurIn','bounce-in':'bounceIn','flip-in':'flipIn',float:'float',none:''}[anim],motion=`animation-name:${key};animation-duration:${duration}ms`;
  const rsvp=rsvpEnabled?`<form id="rsvp"><h2>RSVP</h2><label>Your name<input name="name" required maxlength="120" value="${esc(guest)}"></label><label>Will you attend?<select name="status"><option>Yes, joyfully</option><option>Unable to attend</option><option>Maybe</option></select></label><label>Number of guests<input name="count" type="number" min="1" max="10" value="1"></label><label>Message<textarea name="note" maxlength="1000"></textarea></label><button class="primary">Send RSVP</button></form>`:'';
  const schedule=d.settings?.scheduleEnabled===false?'':`<section><h2>Schedule</h2>${(d.schedule||[]).map(x=>`<p><strong>${esc(x.time)}</strong><br>${esc(x.title)}</p>`).join('')}</section>`,map=/^https?:\/\//i.test(d.mapUrl||'')?`<p><a href="${esc(d.mapUrl)}" target="_blank" rel="noopener"><button>Open map</button></a></p>`:'',extraVenues=(d.venues||[]).map(v=>{let link=/^https?:\/\//i.test(v.mapUrl||'')?`<br><a href="${esc(v.mapUrl)}" target="_blank" rel="noopener">Open map</a>`:'';return`<p><strong>${esc(v.name)}</strong><br>${esc(v.address)}${link}</p>`}).join(''),venue=d.settings?.venueEnabled===false?'':`<section><h2>Venue</h2><p><strong>${esc(f.venue)}</strong></p>${map}${extraVenues}</section>`;
  const sections={gallery:hero&&d.settings?.galleryEnabled!==false?`<img class="reveal" style="animation-delay:.2s;${motion}" src="${esc(hero)}">`:'',schedule,venue,rsvp},order=d.sectionOrder||['gallery','schedule','venue','rsvp'],ordered=order.map(name=>sections[name]||'').join('');
  const youtube=d.settings?.musicEnabled===true&&/^[\w-]{11}$/.test(d.youtubeId||''),audioMusic=d.settings?.musicEnabled===true&&!youtube&&d.music?.url?`<audio id="guestMusic" src="${esc(d.music.url)}" loop></audio>`:'',youtubeMusic=youtube?`<iframe id="youtubePlayer" class="youtube-player" data-video-id="${esc(d.youtubeId)}" title="Invitation music" allow="autoplay; encrypted-media" referrerpolicy="strict-origin-when-cross-origin"></iframe>`:'',musicToggle=youtube||audioMusic?'<button id="musicToggle" class="music-toggle" aria-label="Pause music">♫</button>':'',cover=d.settings?.openingEnabled!==false?`<button id="openCover" class="open-cover opening-${esc(d.openingStyle||'soft')}"><span>YOU ARE INVITED</span><strong>${esc(f.names||'Open invitation')}</strong><em>Tap to open</em></button>`:'';
  root.className=`guest theme-${d.theme||'rose'}`;root.innerHTML=`${cover}${audioMusic}${youtubeMusic}${musicToggle}${guest?`<p>DEAR ${esc(guest).toUpperCase()}</p>`:'<p>YOU ARE INVITED</p>'}<h1 class="reveal" style="${motion}">${esc(f.names)}</h1><h2>${esc(new Date(f.date+'T00:00:00').toLocaleDateString(undefined,{dateStyle:'long'}))}</h2><p>${esc(f.message)}</p>${ordered}`;
  const audio=document.querySelector('#guestMusic'),player=document.querySelector('#youtubePlayer'),openCover=document.querySelector('#openCover'),toggle=document.querySelector('#musicToggle'),start=()=>{if(player&&!player.src){let id=player.dataset.videoId;player.src=`https://www.youtube.com/embed/${id}?autoplay=1&loop=1&playlist=${id}&enablejsapi=1&playsinline=1&origin=${encodeURIComponent(location.origin)}`}else audio?.play().catch(()=>{})};let playing=false;if(openCover){openCover.onclick=()=>{openCover.classList.add('opened');start();playing=true}}else{start();playing=true}if(toggle)toggle.onclick=()=>{playing?(audio?.pause(),player?.contentWindow?.postMessage(JSON.stringify({event:'command',func:'pauseVideo',args:[]}),'https://www.youtube.com')):(audio?.play().catch(()=>{}),player?.contentWindow?.postMessage(JSON.stringify({event:'command',func:'playVideo',args:[]}),'https://www.youtube.com'));playing=!playing;toggle.textContent=playing?'♫':'♪'};
  if(!rsvpEnabled)return;
  document.querySelector('#rsvp').onsubmit=async e=>{e.preventDefault();let data=Object.fromEntries(new FormData(e.target)),r=await fetch('/api/public/'+encodeURIComponent(slug)+'/rsvps',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});e.target.innerHTML=r.ok?'<h2>Thank you!</h2><p>Your response was received.</p>':'<p>We could not save your response. Please try again.</p>'};
}).catch(()=>root.innerHTML='<h1>Invitation unavailable</h1><p>This invitation has not been published.</p>');
</script></body></html>

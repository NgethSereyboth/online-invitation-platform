<!doctype html><html lang="en"><head><script src="theme-init.js"></script><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Template Studio — E-invitation-website</title><link rel="stylesheet" href="styles.css"><link rel="stylesheet" href="studio-experience.css"><style>
.studio{max-width:1240px;margin:auto;padding:28px}.studio-head{display:flex;align-items:center;gap:12px}.studio-head h1{font:40px Georgia,serif;color:var(--accent);margin-right:auto}.studio-toolbar{display:flex;gap:9px;flex-wrap:wrap;margin:18px 0}.studio-toolbar input{flex:1;min-width:240px}.studio-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}.studio-card{background:#fff;border:1px solid var(--line);border-radius:17px;overflow:hidden;box-shadow:0 10px 30px #51372b12}.studio-thumb{height:180px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;background:var(--thumb-bg,#fff7f3);color:var(--thumb-heading,#9d4555)}.studio-thumb::before{content:'';position:absolute;inset:18px;border:1px solid color-mix(in srgb,var(--thumb-heading) 45%,transparent);border-radius:25px}.studio-thumb strong{font:28px Georgia,serif;max-width:75%;text-align:center;position:relative}.studio-thumb .page-stack{position:absolute;right:14px;bottom:12px;display:flex}.studio-thumb .page-stack i{display:block;width:25px;height:34px;border-radius:4px;background:#fff;border:1px solid #0001;margin-left:-14px;box-shadow:0 2px 5px #0002}.studio-body{padding:17px}.studio-title{display:flex;align-items:start;gap:8px}.studio-title h2{font:24px Georgia,serif;margin:0 auto 4px 0}.star{border:0;background:transparent;font-size:22px;color:#bbb;padding:0}.star.active{color:#d39b17}.meta{font-size:12px;color:#776}.tags{display:flex;gap:5px;flex-wrap:wrap;margin:10px 0}.tags span{background:#f3efeb;border-radius:999px;padding:4px 8px;font-size:11px}.studio-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}.studio-actions button{font-size:12px}.version-badge{font-size:11px;padding:4px 8px;border-radius:999px;background:#eee8f8;color:#5a3e8e}.empty{grid-column:1/-1;padding:55px;text-align:center;border:1px dashed var(--line);border-radius:16px}.studio-dialog{width:min(880px,calc(100% - 30px));max-height:88vh;overflow:auto;border:0;border-radius:18px;padding:24px}.studio-dialog::backdrop{background:#1d121a88}.studio-preview{display:grid;grid-template-columns:300px 1fr;gap:22px}.preview-phone{height:580px;border-radius:26px;background:#111;padding:9px}.preview-screen{height:100%;border-radius:19px;overflow:auto;background:var(--p-bg);color:var(--p-text)}.preview-hero{height:390px;display:grid;place-items:center;text-align:center;padding:20px;position:relative}.preview-hero h2{font:38px Georgia,serif;color:var(--p-heading);z-index:2}.preview-page{min-height:110px;margin:12px;padding:15px;border-radius:14px;background:var(--page-bg,#fff);display:grid;place-items:center;text-align:center}.version-row{display:flex;align-items:center;gap:12px;padding:12px;border-bottom:1px solid var(--line)}.version-row strong{margin-right:auto}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.form-grid .wide{grid-column:1/-1}.dialog-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}@media(max-width:700px){.studio-preview{grid-template-columns:1fr}.preview-phone{width:290px;margin:auto}.form-grid{grid-template-columns:1fr}.form-grid .wide{grid-column:auto}}
</style><link rel="stylesheet" href="modern-ui.css">  <link rel="stylesheet" href="final-experience.css">

</head><body data-page="templates"><header><strong>E-invitation-website</strong><a href="dashboard.html"><button>Dashboard</button></a><span id="studioAccount"></span><button id="refreshBtn">Refresh</button></header><main class="studio"><div class="studio-head"><div><h1>Template Studio</h1><p>Manage reusable invitation designs, versions, favorites, and editable copies.</p></div></div><div class="studio-toolbar"><input id="studioSearch" type="search" placeholder="Search your templates…"><select id="studioCategory"><option value="all">All categories</option><option>Wedding</option><option>Birthday</option><option>Business</option><option>Other</option></select><label class="toggle-row"><span>Favorites only</span><input id="studioFavorites" type="checkbox"></label></div><div id="studioGrid" class="studio-grid"></div></main><dialog id="studioDialog" class="studio-dialog"><div id="studioDialogBody"></div><div class="dialog-actions"><button id="studioClose" type="button">Close</button></div></dialog><script src="ui-dialogs.js"></script>

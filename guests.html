<!doctype html><html lang="en"><head><script src="theme-init.js"></script><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Guest List — E-invitation-website</title><link rel="stylesheet" href="styles.css"><style>.guest-admin{max-width:1000px;margin:auto;padding:32px}.top,.filters{display:flex;align-items:center;gap:10px;flex-wrap:wrap}.top h1{font:36px Georgia;color:var(--accent);margin-right:auto}.summary{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin:20px 0}.metric{background:white;padding:18px;border-radius:12px}.metric strong{display:block;font-size:28px;color:var(--accent)}.add-form{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;background:white;padding:16px;border-radius:12px}.filters{margin:16px 0}.filters input{max-width:320px;margin:0}.filters select{width:auto;margin:0}.guest-row{display:grid;grid-template-columns:1fr 130px auto auto auto;gap:8px;align-items:center;background:white;margin-top:8px;padding:13px;border-radius:10px}.checked{border-left:5px solid #3d9361}.qr{padding:30px;text-align:center}.qr img{width:260px;height:260px}@media(max-width:700px){.summary{grid-template-columns:1fr 1fr}.add-form,.guest-row{grid-template-columns:1fr}.guest-row{margin-top:12px}}</style><link rel="stylesheet" href="modern-ui.css">  <link rel="stylesheet" href="final-experience.css">

<link rel="stylesheet" href="theme-hardening.css">
<link rel="stylesheet" href="ux-refine.css">
</head><body data-page="guests"><header><strong>E-invitation-website</strong><a href="dashboard.html"><button>Dashboard</button></a></header><main class="guest-admin"><div class="top"><h1>Guest list</h1><label class="upload">Import CSV<input id="importFile" type="file" accept=".csv,text/csv"></label><button id="exportBtn">Export CSV</button></div><div id="summary" class="summary"></div><form id="addForm" class="add-form"><input name="name" placeholder="Guest name" required><input name="phone" placeholder="Phone number"><button class="primary">Add guest</button></form><div class="filters"><input id="search" placeholder="Search name or phone"><select id="statusFilter"><option value="all">All RSVP statuses</option><option value="yes">Attending</option><option value="no">Declined</option><option value="pending">Pending</option><option value="checked">Checked in</option></select></div><div id="guestList"></div></main><dialog id="qrModal"><button class="close">×</button><div id="qrBody" class="qr"></div></dialog><script src="ui-dialogs.js"></script>

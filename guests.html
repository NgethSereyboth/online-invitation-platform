<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Guest List — Sovan Invite</title><link rel="stylesheet" href="styles.css"><style>.guest-admin{max-width:900px;margin:auto;padding:32px}.top{display:flex;align-items:center;gap:10px}.top h1{font:36px Georgia;color:var(--accent);margin-right:auto}.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:20px 0}.metric{background:white;padding:18px;border-radius:12px}.metric strong{display:block;font-size:28px;color:var(--accent)}.add-form{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;background:white;padding:16px;border-radius:12px}.guest-row{display:grid;grid-template-columns:1fr 140px 130px auto;gap:10px;align-items:center;background:white;margin-top:8px;padding:13px;border-radius:10px}@media(max-width:650px){.summary{grid-template-columns:1fr 1fr}.add-form,.guest-row{grid-template-columns:1fr}.guest-row{margin-top:12px}}</style></head><body><header><strong>Sovan Invite</strong><a href="dashboard.html"><button>Dashboard</button></a></header><main class="guest-admin"><div class="top"><h1>Guest list</h1><button id="exportBtn">Export CSV</button></div><div id="summary" class="summary"></div><form id="addForm" class="add-form"><input name="name" placeholder="Guest name" required><input name="phone" placeholder="Phone number"><button class="primary">Add guest</button></form><div id="guestList"></div></main><script src="guests.js"></script></body></html>

<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>My Invitations — Sovan Invite</title><link rel="stylesheet" href="styles.css"><style>.dash{max-width:1050px;margin:auto;padding:32px}.dash-head{display:flex;align-items:center;gap:12px;margin-bottom:28px}.dash-head h1{font:38px Georgia;margin:0 auto 0 0;color:var(--accent)}.invite-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:18px}.invite-card{background:#fff;border:1px solid var(--line);border-radius:15px;overflow:hidden;box-shadow:0 8px 24px #51372b12}.invite-cover{height:150px;background:linear-gradient(135deg,#f8e8df,var(--accent));display:grid;place-items:center;color:white;font:30px Georgia}.invite-body{padding:16px}.invite-body h2{font:22px Georgia;text-transform:none;letter-spacing:0;margin:0 0 8px}.stats{display:flex;gap:14px;color:#766;margin:14px 0}.login{max-width:420px;margin:80px auto;background:white;padding:28px;border-radius:16px}.login h1{font:34px Georgia;color:var(--accent)}.actions{display:flex;gap:8px;flex-wrap:wrap}.create-dialog{width:min(460px,calc(100% - 32px));border:0;border-radius:18px;padding:26px;box-shadow:0 24px 70px #29151d44}.create-dialog::backdrop{background:#24141b88;backdrop-filter:blur(3px)}.create-dialog h2{font:30px Georgia;color:var(--accent);margin-top:0}.dialog-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:22px}</style></head><body><header><strong>Sovan Invite</strong><span id="accountName"></span><button id="logoutBtn">Sign out</button></header><section id="loginView" class="login"><h1>Welcome back</h1><p>Sign in to manage all your invitations.</p><label>Email<input id="email" type="email" value="demo@sovan.test"></label><label>Password<input id="password" type="password" value="demo1234"></label><button id="loginBtn" class="primary">Sign in</button><p class="hint">Demo account data stays in this browser. Production authentication will use the server.</p></section><section id="dashboardView" class="dash" hidden><div class="dash-head"><h1>My invitations</h1><button id="newBtn" class="primary">+ Create invitation</button></div><div id="inviteGrid" class="invite-grid"></div></section><dialog id="createDialog" class="create-dialog"><form id="createForm"><h2>Create invitation</h2><label>Invitation name<input id="newTitle" required maxlength="120" placeholder="Sophea &amp; Dara"></label><label>Starter type<select id="newType"><option value="Wedding">Wedding</option><option value="Birthday">Birthday</option><option value="Business">Business event</option></select></label><p class="hint">You can change every section, color, animation, and RSVP setting later.</p><div class="dialog-actions"><button id="cancelCreate" type="button">Cancel</button><button id="confirmCreate" class="primary" type="submit">Create and edit</button></div></form></dialog><script src="dashboard.js"></script></body></html>
